<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ML Guide — Hero & Item Asistanı</title>
  <style>
    :root {
      --bg: #0d0f1a;
      --surface: #161926;
      --surface2: #1e2235;
      --border: #2a2f4a;
      --accent: #4f8ef7;
      --accent2: #c084fc;
      --text: #e2e8f0;
      --muted: #64748b;
      --user-bubble: #1e3a5f;
      --ai-bubble: #1e2235;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    /* HEADER */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 12px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 1.1rem;
      font-weight: 700;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .logo-icon { font-size: 1.4rem; }

    .stats-pill {
      font-size: 0.7rem;
      color: var(--muted);
      background: var(--surface2);
      border: 1px solid var(--border);
      padding: 4px 10px;
      border-radius: 20px;
    }

    /* API KEY BANNER */
    #apiKeyBanner {
      background: linear-gradient(135deg, #1a1040, #0f1a30);
      border-bottom: 1px solid var(--border);
      padding: 14px 20px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }

    #apiKeyBanner.hidden { display: none; }

    #apiKeyBanner label {
      font-size: 0.85rem;
      color: var(--muted);
      white-space: nowrap;
    }

    #apiKeyInput {
      flex: 1;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 8px 12px;
      border-radius: 8px;
      font-size: 0.85rem;
      outline: none;
      font-family: monospace;
    }

    #apiKeyInput:focus { border-color: var(--accent); }

    #saveKeyBtn {
      background: var(--accent);
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.85rem;
      white-space: nowrap;
    }

    #changeKeyBtn {
      font-size: 0.7rem;
      color: var(--muted);
      background: none;
      border: 1px solid var(--border);
      padding: 4px 10px;
      border-radius: 6px;
      cursor: pointer;
    }

    /* CHAT */
    #chatContainer {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      scroll-behavior: smooth;
    }

    #chatContainer::-webkit-scrollbar { width: 4px; }
    #chatContainer::-webkit-scrollbar-track { background: transparent; }
    #chatContainer::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .message {
      display: flex;
      gap: 10px;
      max-width: 820px;
      width: 100%;
    }

    .message.user { align-self: flex-end; flex-direction: row-reverse; }
    .message.ai { align-self: flex-start; }

    .avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.9rem;
      flex-shrink: 0;
      margin-top: 2px;
    }

    .message.user .avatar { background: var(--accent); }
    .message.ai .avatar { background: linear-gradient(135deg, #4f8ef7, #c084fc); }

    .bubble {
      padding: 12px 16px;
      border-radius: 14px;
      font-size: 0.9rem;
      line-height: 1.6;
      max-width: calc(100% - 42px);
    }

    .message.user .bubble {
      background: var(--user-bubble);
      border-top-right-radius: 4px;
    }

    .message.ai .bubble {
      background: var(--ai-bubble);
      border: 1px solid var(--border);
      border-top-left-radius: 4px;
    }

    /* Markdown-like rendering */
    .bubble strong { color: #93c5fd; font-weight: 600; }
    .bubble em { color: #c4b5fd; }

    .bubble table {
      border-collapse: collapse;
      width: 100%;
      margin: 8px 0;
      font-size: 0.85rem;
    }

    .bubble th, .bubble td {
      border: 1px solid var(--border);
      padding: 6px 10px;
      text-align: left;
    }

    .bubble th { background: var(--surface2); color: var(--accent); }
    .bubble tr:hover td { background: rgba(79,142,247,0.05); }

    .bubble code {
      background: var(--surface2);
      padding: 2px 6px;
      border-radius: 4px;
      font-family: monospace;
      font-size: 0.85rem;
      color: #86efac;
    }

    .bubble ul, .bubble ol {
      padding-left: 18px;
      margin: 6px 0;
    }

    .bubble li { margin: 3px 0; }

    .bubble h3 {
      color: var(--accent);
      margin: 10px 0 6px;
      font-size: 0.95rem;
    }

    .bubble hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 10px 0;
    }

    /* Typing indicator */
    .typing-dots {
      display: flex;
      gap: 4px;
      padding: 4px 0;
    }

    .typing-dots span {
      width: 7px; height: 7px;
      background: var(--muted);
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }

    .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
      40% { transform: translateY(-6px); opacity: 1; }
    }

    /* SUGGESTIONS */
    #suggestions {
      padding: 0 20px 12px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      flex-shrink: 0;
    }

    .suggestion-btn {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 7px 14px;
      border-radius: 20px;
      font-size: 0.8rem;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }

    .suggestion-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    /* INPUT */
    #inputArea {
      background: var(--surface);
      border-top: 1px solid var(--border);
      padding: 14px 20px;
      display: flex;
      gap: 10px;
      align-items: flex-end;
      flex-shrink: 0;
    }

    #messageInput {
      flex: 1;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 10px 14px;
      border-radius: 12px;
      font-size: 0.9rem;
      resize: none;
      outline: none;
      min-height: 44px;
      max-height: 120px;
      line-height: 1.5;
      font-family: inherit;
      overflow-y: auto;
    }

    #messageInput:focus { border-color: var(--accent); }
    #messageInput::placeholder { color: var(--muted); }

    #sendBtn {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: white;
      border: none;
      width: 44px;
      height: 44px;
      border-radius: 12px;
      cursor: pointer;
      font-size: 1.1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity 0.15s;
      flex-shrink: 0;
    }

    #sendBtn:disabled { opacity: 0.4; cursor: not-allowed; }
    #sendBtn:hover:not(:disabled) { opacity: 0.85; }

    /* Welcome */
    .welcome {
      text-align: center;
      padding: 40px 20px;
      color: var(--muted);
    }

    .welcome h2 {
      font-size: 1.4rem;
      font-weight: 700;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 8px;
    }

    .welcome p { font-size: 0.9rem; }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <span class="logo-icon">⚔️</span>
    ML Guide
  </div>
  <div style="display:flex;gap:8px;align-items:center">
    <span class="stats-pill" id="dataBadge">Yükleniyor...</span>
    <button id="changeKeyBtn" onclick="showKeyBanner()">API Key</button>
  </div>
</header>

<div id="apiKeyBanner">
  <label>API Key:</label>
  <select id="apiProvider" onchange="updatePlaceholder()" style="background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:8px 10px;border-radius:8px;font-size:0.85rem;outline:none;cursor:pointer">
    <option value="anthropic">Anthropic (Claude)</option>
    <option value="openai">OpenAI (ChatGPT)</option>
  </select>
  <input type="password" id="apiKeyInput" placeholder="sk-ant-..." />
  <button id="saveKeyBtn" onclick="saveKey()">Kaydet</button>
</div>

<div id="chatContainer">
  <div class="welcome" id="welcomeMsg">
    <h2>Mobile Legends Asistanı</h2>
    <p>Hero istatistikleri, item build'leri ve strateji hakkında Türkçe sorabilirsin.</p>
  </div>
</div>

<div id="suggestions">
  <button class="suggestion-btn" onclick="suggest('Julian için en iyi build nedir?')">Julian build</button>
  <button class="suggestion-btn" onclick="suggest('En yüksek HP\'li hero hangisi?')">En güçlü tank</button>
  <button class="suggestion-btn" onclick="suggest('Layla\'nın istatistikleri neler?')">Layla stats</button>
  <button class="suggestion-btn" onclick="suggest('Magic Power veren en iyi 5 item hangisi?')">MP itemleri</button>
  <button class="suggestion-btn" onclick="suggest('Assassin rolündeki herolar hangileri?')">Assassin'ler</button>
  <button class="suggestion-btn" onclick="suggest('3000 gold\'dan ucuz en iyi hasar itemleri')">Ucuz hasar itemleri</button>
</div>

<div id="inputArea">
  <textarea id="messageInput" placeholder="Soru sor... (Enter = gönder, Shift+Enter = yeni satır)" rows="1"></textarea>
  <button id="sendBtn" onclick="sendMessage()">➤</button>
</div>

<script src="data.js"></script>
<script>
// ─── State ────────────────────────────────────────────────────────────────────
let apiKey = localStorage.getItem('ml_api_key') || atob('c2stYW50LWFwaTAzLTFWUDVLcW53LUJhY3lOVkt5VU56REFIUHhHWkNtSkZQUmVyaWFZQXJ6U21teUF0N3dSTEZ4ZGNhRm5jR0FlYng3SnhkTDRxbVVLUUdZVFkyYnB5VjNRLWVhSUFFQUFB');
let apiProvider = localStorage.getItem('ml_api_provider') || 'anthropic';
let isLoading = false;
const history = [];

// ─── Init ─────────────────────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
  if (apiKey) {
    document.getElementById('apiKeyBanner').classList.add('hidden');
  }
  document.getElementById('apiProvider').value = apiProvider;

  // Data badge
  const heroCount = (typeof ML_HEROES !== 'undefined') ? ML_HEROES.length : 0;
  const itemCount = (typeof ML_ITEMS !== 'undefined') ? ML_ITEMS.length : 0;
  document.getElementById('dataBadge').textContent = `${heroCount} hero · ${itemCount} item`;

  // Auto-resize textarea
  const input = document.getElementById('messageInput');
  input.addEventListener('input', () => {
    input.style.height = 'auto';
    input.style.height = Math.min(input.scrollHeight, 120) + 'px';
  });

  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });
});

// ─── API Key ──────────────────────────────────────────────────────────────────
function showKeyBanner() {
  const banner = document.getElementById('apiKeyBanner');
  banner.classList.toggle('hidden');
  if (!banner.classList.contains('hidden')) {
    document.getElementById('apiKeyInput').value = apiKey;
    document.getElementById('apiKeyInput').focus();
  }
}

function updatePlaceholder() {
  const provider = document.getElementById('apiProvider').value;
  document.getElementById('apiKeyInput').placeholder = provider === 'openai' ? 'sk-...' : 'sk-ant-...';
}

function saveKey() {
  const val = document.getElementById('apiKeyInput').value.trim();
  const provider = document.getElementById('apiProvider').value;
  if (provider === 'anthropic' && !val.startsWith('sk-ant-')) {
    alert('Geçersiz Anthropic key formatı. "sk-ant-" ile başlamalı.');
    return;
  }
  if (provider === 'openai' && !val.startsWith('sk-')) {
    alert('Geçersiz OpenAI key formatı. "sk-" ile başlamalı.');
    return;
  }
  apiKey = val;
  apiProvider = provider;
  localStorage.setItem('ml_api_key', val);
  localStorage.setItem('ml_api_provider', provider);
  document.getElementById('apiKeyBanner').classList.add('hidden');
}

// ─── System Prompt ────────────────────────────────────────────────────────────
function buildSystemPrompt() {
  const heroData = JSON.stringify(ML_HEROES, null, 0);
  const itemData = JSON.stringify(ML_ITEMS, null, 0);

  return `Sen bir Mobile Legends: Bang Bang uzmanısın. Aşağıda oyundaki tüm hero ve item verileri bulunuyor. Bu verileri kullanarak kullanıcıların sorularını Türkçe yanıtla.

## HERO VERİSİ (${ML_HEROES.length} hero):
${heroData}

## ITEM VERİSİ (${ML_ITEMS.length} item):
${itemData}

## KURALLLAR:
- Daima Türkçe cevap ver
- Sayısal verileri tablolarla göster (markdown tablo formatı kullan)
- Build önerilerinde item sırası önemli: önce core item'lar, sonra situational
- Pasif/aktif sinerji açıklama
- İstatistikleri her zaman veriden çek, tahmin etme
- Cevaplar net ve kısa olsun — gereksiz giriş yapma`;
}

// ─── Chat ─────────────────────────────────────────────────────────────────────
function addMessage(role, content) {
  const welcome = document.getElementById('welcomeMsg');
  if (welcome) welcome.remove();

  const container = document.getElementById('chatContainer');
  const div = document.createElement('div');
  div.className = `message ${role}`;

  const avatar = document.createElement('div');
  avatar.className = 'avatar';
  avatar.textContent = role === 'user' ? '👤' : '⚔️';

  const bubble = document.createElement('div');
  bubble.className = 'bubble';

  if (role === 'ai') {
    bubble.innerHTML = renderMarkdown(content);
  } else {
    bubble.textContent = content;
  }

  div.appendChild(avatar);
  div.appendChild(bubble);
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
  return bubble;
}

function addTyping() {
  const welcome = document.getElementById('welcomeMsg');
  if (welcome) welcome.remove();

  const container = document.getElementById('chatContainer');
  const div = document.createElement('div');
  div.className = 'message ai';
  div.id = 'typingIndicator';

  const avatar = document.createElement('div');
  avatar.className = 'avatar';
  avatar.textContent = '⚔️';

  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.innerHTML = '<div class="typing-dots"><span></span><span></span><span></span></div>';

  div.appendChild(avatar);
  div.appendChild(bubble);
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
}

function removeTyping() {
  const t = document.getElementById('typingIndicator');
  if (t) t.remove();
}

async function sendMessage() {
  if (isLoading) return;

  const input = document.getElementById('messageInput');
  const text = input.value.trim();
  if (!text) return;

  if (!apiKey) {
    showKeyBanner();
    document.getElementById('apiKeyInput').focus();
    return;
  }

  input.value = '';
  input.style.height = 'auto';
  addMessage('user', text);
  history.push({ role: 'user', content: text });

  isLoading = true;
  document.getElementById('sendBtn').disabled = true;
  addTyping();

  try {
    let reply;

    if (apiProvider === 'openai') {
      const response = await fetch('https://api.openai.com/v1/chat/completions', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${apiKey}`,
        },
        body: JSON.stringify({
          model: 'gpt-4o-mini',
          max_tokens: 1024,
          messages: [
            { role: 'system', content: buildSystemPrompt() },
            ...history.slice(-10),
          ],
        }),
      });
      const data = await response.json();
      if (!response.ok) throw new Error(data?.error?.message || `HTTP ${response.status}`);
      reply = data.choices?.[0]?.message?.content || '(boş yanıt)';
    } else {
      const response = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'x-api-key': apiKey,
          'anthropic-version': '2023-06-01',
          'anthropic-dangerous-direct-browser-access': 'true',
        },
        body: JSON.stringify({
          model: 'claude-haiku-4-5-20251001',
          max_tokens: 1024,
          system: buildSystemPrompt(),
          messages: history.slice(-10),
        }),
      });
      const data = await response.json();
      if (!response.ok) throw new Error(data?.error?.message || `HTTP ${response.status}`);
      reply = data.content?.[0]?.text || '(boş yanıt)';
    }

    history.push({ role: 'assistant', content: reply });
    removeTyping();
    addMessage('ai', reply);

  } catch (err) {
    removeTyping();
    addMessage('ai', `⚠️ Hata: ${err.message}`);
  } finally {
    isLoading = false;
    document.getElementById('sendBtn').disabled = false;
    input.focus();
  }
}

function suggest(text) {
  document.getElementById('messageInput').value = text;
  sendMessage();
}

// ─── Markdown Renderer ────────────────────────────────────────────────────────
function renderMarkdown(text) {
  // Escape HTML first
  let html = text
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;');

  // Code blocks
  html = html.replace(/```[\w]*\n?([\s\S]*?)```/g, '<pre><code>$1</code></pre>');

  // Inline code
  html = html.replace(/`([^`]+)`/g, '<code>$1</code>');

  // Headers
  html = html.replace(/^### (.+)$/gm, '<h3>$1</h3>');
  html = html.replace(/^## (.+)$/gm, '<h3>$1</h3>');

  // Bold
  html = html.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');

  // Italic
  html = html.replace(/\*([^*]+)\*/g, '<em>$1</em>');

  // HR
  html = html.replace(/^---+$/gm, '<hr>');

  // Tables
  html = html.replace(/(\|.+\|\n)+/g, (match) => {
    const rows = match.trim().split('\n');
    if (rows.length < 2) return match;

    let tableHtml = '<table>';
    rows.forEach((row, i) => {
      if (row.match(/^\|[-| :]+\|$/)) return; // separator row
      const cells = row.split('|').filter((_, idx, arr) => idx > 0 && idx < arr.length - 1);
      const tag = i === 0 ? 'th' : 'td';
      tableHtml += '<tr>' + cells.map(c => `<${tag}>${c.trim()}</${tag}>`).join('') + '</tr>';
    });
    tableHtml += '</table>';
    return tableHtml;
  });

  // Lists
  html = html.replace(/^[-*] (.+)$/gm, '<li>$1</li>');
  html = html.replace(/(<li>.*<\/li>(\n|$))+/g, m => `<ul>${m}</ul>`);

  // Numbered lists
  html = html.replace(/^\d+\. (.+)$/gm, '<li>$1</li>');

  // Paragraphs (double newline)
  html = html.replace(/\n\n+/g, '</p><p>');
  html = '<p>' + html + '</p>';

  // Single newlines
  html = html.replace(/([^>])\n([^<])/g, '$1<br>$2');

  // Clean up empty paragraphs
  html = html.replace(/<p><\/p>/g, '');
  html = html.replace(/<p>(<h[1-6]>)/g, '$1');
  html = html.replace(/(<\/h[1-6]>)<\/p>/g, '$1');
  html = html.replace(/<p>(<table>)/g, '$1');
  html = html.replace(/(<\/table>)<\/p>/g, '$1');
  html = html.replace(/<p>(<ul>)/g, '$1');
  html = html.replace(/(<\/ul>)<\/p>/g, '$1');
  html = html.replace(/<p>(<hr>)<\/p>/g, '$1');
  html = html.replace(/<p>(<pre>)/g, '$1');
  html = html.replace(/(<\/pre>)<\/p>/g, '$1');

  return html;
}
</script>
</body>
</html>
